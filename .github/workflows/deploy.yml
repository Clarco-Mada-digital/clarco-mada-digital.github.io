name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution à la fois, sans annuler un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Dépôt "utilisateur" (clarco-mada-digital.github.io) → servi à la racine.
          SITE_URL: https://clarco-mada-digital.github.io
          # Pas de BASE_PATH nécessaire (site à la racine). Si un jour tu passes
          # sur un dépôt "projet" (URL .../<repo>/), ajoute : BASE_PATH: /<repo>
          #
          # Clés via secrets GitHub (Settings > Secrets and variables > Actions) :
          # WEB3FORMS_KEY (formulaire de contact) et CF_ANALYTICS_TOKEN
          # (Cloudflare Web Analytics). Hors du dépôt : un fork n'hérite pas des
          # clés (elles restent toutefois visibles dans le code livré du site —
          # clés publiques par conception).
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
          CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
